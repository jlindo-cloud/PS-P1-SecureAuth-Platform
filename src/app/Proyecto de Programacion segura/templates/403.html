{% extends 'layout.html' %}
{% block content %}
  <section class="error-section animate-in">
    <h2>403 — Acceso denegado</h2>
    <p style="color: var(--muted); font-size: 1.05rem; max-width: 480px; margin: 0 auto 24px;">
      No tienes los permisos necesarios para acceder a este recurso. Contacta al administrador si crees que es un error.
    </p>
    <a class="btn" href="{{ url_for('index') }}">Volver al catálogo</a>
  </section>
{% endblock %}
