# Despliegue en Render (plan gratuito)
#
# Uso:
#   1. Subir el proyecto a GitHub.
#   2. En render.com: New > Blueprint > seleccionar el repo.
#   3. Render lee este archivo y crea el servicio web + la
#      base de datos PostgreSQL.
#   4. Completar en el panel las variables marcadas como
#      sync: false (secretos: SMTP y pepper).
#
# HTTPS con certificado válido y HSTS quedan activos de
# forma automática en el dominio *.onrender.com.

version: "1" # <-- ESTA LÍNEA ES OBLIGATORIA PARA QUE RENDER LO ACEPTE

services:
  - type: web
    name: secureauth-store
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    # Migración y carga inicial en la fase de pre-deploy, NO en
    # el arranque de la aplicación: el proceso que sirve tráfico
    # nunca altera el esquema (SECURITY.md del curso).
    preDeployCommand: flask --app run.py db upgrade && python seed.py
    startCommand: >-
      gunicorn --bind=0.0.0.0:$PORT --workers=2 --threads=4
      --timeout=120 --access-logfile=- --error-logfile=- "run:app"
    # Sonda dedicada y exenta de rate limiting: /catalogo estaba
    # limitado y el verificador recibía 429, lo que Render
    # interpretaba como instancia caída.
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: SESSION_MINUTES
        value: "30"
      # Secretos generados automáticamente por Render
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: AUDIT_HMAC_KEY
        generateValue: true
      - key: PASSWORD_PEPPER
        generateValue: true
      # Base de datos administrada
      - key: DATABASE_URL
        fromDatabase:
          name: secureauth-db
          property: connectionString
      # ---------------------------------------------------
      # Correo del segundo factor
      # ---------------------------------------------------
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      # Administrador inicial: correo REAL
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: OTP_TTL_SECONDS
        value: "300"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
databases:
  - name: secureauth-db
    plan: free
    databaseName: secureauth
    user: secureauth
