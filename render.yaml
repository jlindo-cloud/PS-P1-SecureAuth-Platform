version: "1"

services:
  - type: web
    name: secureauth-store
    runtime: python
    plan: free
    region: oregon
    # Se añade la migración y la carga inicial al final del buildCommand usando '&&'
    buildCommand: pip install -r requirements.txt && flask --app run.py db upgrade && python seed.py
    startCommand: >-
      gunicorn --bind=0.0.0.0:$PORT --workers=2 --threads=4
      --timeout=120 --access-logfile=- --error-logfile=- "run:app"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: SESSION_MINUTES
        value: "30"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: AUDIT_HMAC_KEY
        generateValue: true
      - key: PASSWORD_PEPPER
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: secureauth-db
          property: connectionString
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: ://gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: OTP_TTL_SECONDS
        value: "300"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
databases:
  - name: secureauth-db
    plan: free
    databaseName: secureauth
    user: secureauth
